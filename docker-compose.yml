version: "3.9"

services:
  backend:
    build: ./backend
    container_name: fdi-backend
    ports:
      - "8000:8000"
    volumes:
      - fdi-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/financial_docs.db

  frontend:
    build: ./frontend
    container_name: fdi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  fdi-data:
